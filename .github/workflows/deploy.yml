name: Deploy and Release Workflow

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'

# Cấp quyền cho GitHub Actions để tạo Release và đẩy gói (Packages) nếu cần
permissions:
  contents: write
  packages: write

jobs:
  # Job Deploy Staging (Giữ nguyên từ Part C)
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: staging
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Simulate Deploy to Staging
        run: |
          echo "Connecting to Staging VM via SSH..."
          echo "Deploy to Staging completed successfully!"

  # Job Deploy Production + Tag-based Release
  deploy-production:
    name: Deploy to Production & Create Release
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment: production 
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Lấy toàn bộ lịch sử commit để tự sinh Release Note chính xác

      # 1. Mô phỏng việc Build & Tag Docker Image 
      - name: Simulate Docker Build & Tag
        run: |
          echo "Building Docker image..."
          echo "Tagging image with version: ${{ github.ref_name }}"
          echo "Successfully tagged: ghcr.io/${{ github.repository }}/demo-app:${{ github.ref_name }}"
          echo "Pushing Docker image to GitHub Container Registry (GHCR)..."

      - name: Simulate Deploy to Production
        run: |
          echo "Connecting to Production VM..."
          echo "Pulling image: ghcr.io/${{ github.repository }}/demo-app:${{ github.ref_name }}..."
          echo "Deploy to Production completed successfully!"

      # 3. Tự động tạo GitHub Release & Tự sinh Release Note 
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true # Tự động tạo release note dựa trên các commit mới
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
